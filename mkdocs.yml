site_name: YouTube Audio
site_description: >-
  Audio-only YouTube and YouTube Music for Firefox on desktop and Android.
  Background play, ad and telemetry blocking, segment skipping, YT Music
  loudness and EQ, and one-tap audio download.
site_author: Animesh Kundu
site_url: https://animeshkundu.github.io/youtube-audio/

repo_url: https://github.com/animeshkundu/youtube-audio
repo_name: animeshkundu/youtube-audio
edit_uri: edit/master/docs/

copyright: Made by Animesh Kundu. GPL-3.0 licensed.

theme:
  name: material
  language: en
  custom_dir: docs/overrides
  logo: assets/logo.png
  favicon: assets/favicon.png
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
  palette:
    # Dark-first: the slate scheme is listed first so it is the default.
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to light mode
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.footer
    - navigation.tracking
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
    - toc.follow

extra_css:
  - assets/brand.css
  - assets/site.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/animeshkundu/youtube-audio
      name: YouTube Audio on GitHub
    - icon: fontawesome/brands/firefox-browser
      link: https://github.com/animeshkundu/youtube-audio#install
      name: Install for Firefox

markdown_extensions:
  # Callouts and collapsible callouts
  - admonition
  - pymdownx.details
  # Rich fenced blocks, including a Mermaid custom fence
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  # Content tabs (content.tabs.link keeps them in sync)
  - pymdownx.tabbed:
      alternate_style: true
  # Cards, icons, and inline HTML on the landing page
  - attr_list
  - md_in_html
  - tables
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

  - toc:
      permalink: true
      toc_depth: 3

plugins:
  - search
  - minify:
      minify_html: true

