name: CI

on:
  push:
    branches: [main, master, rebuild]
  pull_request:
    branches: [main, master, rebuild]
  workflow_dispatch:

# Cancel superseded runs for ordinary refs. Every master push gets its own gate run (keyed by the
# commit SHA, which is unique and reliably available in the concurrency context, unlike run_id) so a
# later merge never cancels an in-flight release job.
concurrency:
  group: ${{ github.workflow }}-${{ (github.event_name == 'push' && github.ref == 'refs/heads/master') && github.sha || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Typecheck, lint, format, test, and validate MV2
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Run unit tests
        run: npm test

      - name: Build Firefox MV2
        run: npm run build

      - name: Validate Firefox MV2 package
        run: npx web-ext lint --source-dir=.output/firefox-mv2

  build-mv3:
    name: Build Firefox MV3 capability artifact
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Firefox MV3
        run: npm run build:mv3

  bench:
    name: Hermetic Selenium Firefox bench
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      # The ubuntu-latest system Firefox is a snap, which geckodriver cannot drive.
      # setup-firefox installs a real, non-snap Firefox and exposes its path. We track the
      # latest mainline release (proven green): latest-esr regressed the seeded-settings
      # sessions in CI. If a future Firefox release breaks the bench, pin a known-good version here.
      - name: Install Firefox (non-snap)
        id: firefox
        uses: browser-actions/setup-firefox@v1

      # Deterministic: local hermetic fixture, no live YouTube. Safe to gate on.
      - name: Run hermetic integration bench
        run: xvfb-run --auto-servernum npm run test:bench
        env:
          FIREFOX_BIN: ${{ steps.firefox.outputs.firefox-path }}

  matrix:
    name: Settings-permutation matrix (Firefox)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Firefox (non-snap)
        id: firefox
        uses: browser-actions/setup-firefox@v1

      # Drives the real built add-on across the full toggle permutation space (all-off, each
      # toggle alone, a pairwise covering array, interaction pairs, quality/EQ/download/telemetry
      # edges) against the hermetic fixture. Deterministic; safe to gate on.
      - name: Run settings-permutation matrix
        run: xvfb-run --auto-servernum npm run test:matrix
        env:
          FIREFOX_BIN: ${{ steps.firefox.outputs.firefox-path }}

  release-on-merge:
    name: Publish GitHub Release and bump version
    needs: [validate, build-mv3, bench, matrix]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: release-on-merge
      cancel-in-progress: false
    steps:
      - name: Checkout master
        uses: actions/checkout@v7
        with:
          # Pin the release bytes to the exact master merge commit whose gates passed.
          ref: ${{ github.sha }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build packaged Firefox XPI
        run: npm run build:ext

      - name: Read version and name asset
        id: version
        shell: bash
        run: |
          set -euo pipefail
          version="$(node -p "require('./package.json').version")"
          cp dist/youtube-audio.xpi "dist/youtube-audio-${version}.xpi"
          echo "current=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=v${version}" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release if new
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.current }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" >/dev/null 2>&1 || \
            git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Release or tag $TAG already exists; skipping GitHub Release creation."
            exit 0
          fi

          asset="dist/youtube-audio-${VERSION}.xpi"
          if [[ -f docs/release-notes/NEXT.md ]]; then
            gh release create "$TAG" "$asset" \
              --target "$GITHUB_SHA" \
              --title "$TAG" \
              --notes-file docs/release-notes/NEXT.md \
              --latest
          else
            gh release create "$TAG" "$asset" \
              --target "$GITHUB_SHA" \
              --title "$TAG" \
              --generate-notes \
              --latest
          fi

      - name: Bump final version segment
        id: bump
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('node:fs');
          const path = 'package.json';
          const packageJson = JSON.parse(fs.readFileSync(path, 'utf8'));
          const parts = packageJson.version.split('.');
          if (parts.length < 2 || !parts.every((part) => /^\d+$/.test(part))) {
            throw new Error(`Expected a dot-separated numeric version, got ${packageJson.version}`);
          }
          parts[parts.length - 1] = String(Number(parts.at(-1)) + 1);
          packageJson.version = parts.join('.');
          fs.writeFileSync(path, `${JSON.stringify(packageJson, null, 2)}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `next=${packageJson.version}\n`);
          NODE

      - name: Commit and push version bump
        shell: bash
        env:
          CURRENT_VERSION: ${{ steps.version.outputs.current }}
          NEXT_VERSION: ${{ steps.bump.outputs.next }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore(release): v${CURRENT_VERSION}, bump to v${NEXT_VERSION} [skip ci]"
          git fetch origin master
          git rebase origin/master
          git push origin HEAD:master
