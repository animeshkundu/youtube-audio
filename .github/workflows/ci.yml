name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Check formatting with Prettier
        run: npm run format:check

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm test -- --coverage --coverageReporters=json-summary --coverageReporters=text

      - name: Check coverage threshold
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            COVERAGE=$(jq '.total.lines.pct' coverage/coverage-summary.json)
            echo "Current coverage: $COVERAGE%"
            if (( $(awk "BEGIN {print ($COVERAGE < 90)}") )); then
              echo "❌ Coverage is $COVERAGE%, minimum required is 90%"
              exit 1
            else
              echo "✅ Coverage meets threshold"
            fi
          else
            echo "⚠️ No coverage report found - skipping threshold check"
          fi

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript"

  build:
    name: Build Extension
    runs-on: ubuntu-latest
    needs: [lint, test]
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate manifest.json
        run: |
          echo "Validating manifest.json..."
          if [ -f manifest.json ]; then
            jq . manifest.json > /dev/null
            echo "✅ manifest.json is valid JSON"
          else
            echo "❌ manifest.json not found"
            exit 1
          fi

      - name: Check required files
        run: |
          echo "Checking required extension files..."
          required_files=(
            "manifest.json"
            "js/global.js"
            "js/youtube_audio.js"
            "css/youtube_audio.css"
          )
          for file in "${required_files[@]}"; do
            if [ -f "$file" ]; then
              echo "✅ $file exists"
            else
              echo "❌ $file is missing"
              exit 1
            fi
          done

      - name: Package extension
        run: |
          echo "Creating extension package..."
          zip -r youtube-audio-extension.zip \
            manifest.json \
            js/ \
            css/ \
            html/ \
            img/ \
            -x "*.git*" \
            -x "node_modules/*" \
            -x "*.test.js"
          echo "✅ Extension packaged successfully"

      - name: Upload extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: youtube-audio-extension
          path: youtube-audio-extension.zip
          retention-days: 30
