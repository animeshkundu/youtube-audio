name: CI

on:
  push:
    branches: [main, master, rebuild]
  pull_request:
    branches: [main, master, rebuild]
  workflow_dispatch:

# Cancel superseded runs for the same ref so only the newest commit's checks run.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Typecheck, lint, format, test, and validate MV2
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Run unit tests
        run: npm test

      - name: Build Firefox MV2
        run: npm run build

      - name: Validate Firefox MV2 package
        run: npx web-ext lint --source-dir=.output/firefox-mv2

  build-mv3:
    name: Build Firefox MV3 capability artifact
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Firefox MV3
        run: npm run build:mv3

  bench:
    name: Hermetic Selenium Firefox bench
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      # The ubuntu-latest system Firefox is a snap, which geckodriver cannot drive.
      # setup-firefox installs a real, non-snap Firefox and exposes its path. We track the
      # latest mainline release (proven green): latest-esr regressed the seeded-settings
      # sessions in CI. If a future Firefox release breaks the bench, pin a known-good version here.
      - name: Install Firefox (non-snap)
        id: firefox
        uses: browser-actions/setup-firefox@v1

      # Deterministic: local hermetic fixture, no live YouTube. Safe to gate on.
      - name: Run hermetic integration bench
        run: xvfb-run --auto-servernum npm run test:bench
        env:
          FIREFOX_BIN: ${{ steps.firefox.outputs.firefox-path }}

  matrix:
    name: Settings-permutation matrix (Firefox)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Firefox (non-snap)
        id: firefox
        uses: browser-actions/setup-firefox@v1

      # Drives the real built add-on across the full toggle permutation space (all-off, each
      # toggle alone, a pairwise covering array, interaction pairs, quality/EQ/download/telemetry
      # edges) against the hermetic fixture. Deterministic; safe to gate on.
      - name: Run settings-permutation matrix
        run: xvfb-run --auto-servernum npm run test:matrix
        env:
          FIREFOX_BIN: ${{ steps.firefox.outputs.firefox-path }}

  docs:
    name: MkDocs strict build (nav + links)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements-docs.txt

      - name: Install documentation dependencies
        run: pip install -r requirements-docs.txt

      # --strict fails on a broken nav entry, a dangling internal link, or a page missing from
      # the nav, so a stale docs tree cannot merge green.
      - name: Build docs (strict)
        run: mkdocs build --strict
