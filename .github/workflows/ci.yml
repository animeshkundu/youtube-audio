name: CI

on:
  push:
    branches: [main, master, rebuild]
  pull_request:
    branches: [main, master, rebuild]
  workflow_dispatch:

# Cancel superseded runs for the same ref so only the newest commit's checks run.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Typecheck, lint, format, test, and validate MV2
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Run unit tests
        run: npm test

      - name: Build Firefox MV2
        run: npm run build

      - name: Validate Firefox MV2 package
        run: npx web-ext lint --source-dir=.output/firefox-mv2

  build-mv3:
    name: Build Firefox MV3 capability artifact
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Firefox MV3
        run: npm run build:mv3

  bench:
    name: Hermetic Selenium Firefox bench
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      # The ubuntu-latest system Firefox is a snap, which geckodriver cannot drive.
      # setup-firefox installs a real, non-snap Firefox and exposes its path. Pin to
      # latest-esr so a same-day mainline Firefox release cannot break this GATING job.
      - name: Install Firefox (non-snap)
        id: firefox
        uses: browser-actions/setup-firefox@v1
        with:
          firefox-version: latest-esr

      # Deterministic: local hermetic fixture, no live YouTube. Safe to gate on.
      - name: Run hermetic integration bench
        run: xvfb-run --auto-servernum npm run test:bench
        env:
          FIREFOX_BIN: ${{ steps.firefox.outputs.firefox-path }}
