name: CI

on:
  push:
    branches: [main, master, rebuild]
  pull_request:
    branches: [main, master, rebuild]
  workflow_dispatch:
    inputs:
      run_bench:
        description: Run the optional Selenium Firefox bench
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  validate:
    name: Typecheck, lint, test, and validate MV2
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Run unit tests
        run: npm test

      - name: Build Firefox MV2
        run: npm run build

      - name: Validate Firefox MV2 package
        run: npx web-ext lint --source-dir=.output/firefox-mv2

  build-mv3:
    name: Build Firefox MV3 capability artifact
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Firefox MV3
        run: npm run build:mv3

  bench:
    name: Optional Selenium Firefox bench
    if: github.event_name == 'workflow_dispatch' && inputs.run_bench
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run integration bench
        run: xvfb-run --auto-servernum npm run test:bench
