name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  sign-and-publish:
    name: Validate, sign, and publish Firefox MV2
    runs-on: ubuntu-latest
    env:
      AMO_JWT_ISSUER: ${{ secrets.AMO_JWT_ISSUER }}
      AMO_JWT_SECRET: ${{ secrets.AMO_JWT_SECRET }}
      FIREFOX_EXTENSION_ID: youtube-audio@local
      SELF_HOSTED_UPDATE_URL: https://animeshkundu.github.io/youtube-audio/updates.json
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run release gates
        run: npm run typecheck && npm run lint && npm test && npm run build

      - name: Validate Firefox MV2 package
        run: npx web-ext lint --source-dir=.output/firefox-mv2

      - name: Sign unlisted Firefox MV2 package
        run: npm run release:sign

      - name: Prepare release assets
        id: assets
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(node -p "require('./package.json').version")"
          if [ "${GITHUB_REF_NAME#v}" != "$VERSION" ]; then
            echo "Tag $GITHUB_REF_NAME must match package version $VERSION" >&2
            exit 1
          fi
          XPI="dist/youtube-audio-${VERSION}-signed.xpi"
          HASH="$(sha256sum "$XPI" | cut -d' ' -f1)"
          UPDATE_LINK="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/$(basename "$XPI")"
          jq \
            --arg id "$FIREFOX_EXTENSION_ID" \
            --arg version "$VERSION" \
            --arg link "$UPDATE_LINK" \
            --arg hash "sha256:$HASH" \
            '.addons = {($id): {updates: [{version: $version, update_link: $link, update_hash: $hash, applications: {gecko: {strict_min_version: "128.0"}}}]}}' \
            updates.json > dist/updates.json
          echo "xpi=$XPI" >> "$GITHUB_OUTPUT"

      - name: Publish signed XPI
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.assets.outputs.xpi }}

      - name: Publish update manifest
        uses: softprops/action-gh-release@v2
        with:
          files: dist/updates.json
