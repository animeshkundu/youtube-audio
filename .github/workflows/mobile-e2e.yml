name: Mobile E2E (best-effort)

# NON-GATING nightly probe of the core audio-only path on Fenix (Firefox for Android)
# running in an x86_64 Android emulator. This exercises the real extension against LIVE
# m.youtube.com, so it is inherently flaky (emulator quirks, YouTube bot-flagging, Fenix
# UI drift). It never blocks merges; treat red runs as a signal to investigate, not a stop.
#
# FIRST-RUN NOTE: the Fenix "Remote debugging via USB" enable flow (via tests/e2e/android/ui.py)
# and the pinned APK version are the tuning-sensitive parts. Expect to iterate on the first
# few live runs. See docs/ci-cd.md for the caveats.

on:
  schedule:
    # 04:17 UTC nightly. Off-peak and off-:00/:30 to avoid Actions scheduler congestion.
    - cron: '17 4 * * *'
  workflow_dispatch:
    inputs:
      fenix_apk_url:
        description: Override the Fenix x86_64 APK URL (leave blank to use the pinned default)
        required: false
        default: ''

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # The CI emulator is x86_64, NOT arm64. The mobile probe simply installs the extension into
  # whatever Fenix is running, so the arch choice lives here at the APK-install layer: we must
  # install the x86_64 Fenix build (an arm64 APK will not install on an x86_64 emulator).
  # Bump the version here, or override per-run via the workflow_dispatch input, if it ages out.
  FENIX_APK_URL: 'https://archive.mozilla.org/pub/fenix/releases/130.0/android/fenix-130.0-android-x86_64/fenix-130.0.multi.android-x86_64.apk'

jobs:
  mobile-probe:
    name: Fenix Android emulator core probe (non-gating)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    # Best-effort: never fail the workflow / block a merge on mobile-emulator or live-YouTube flake.
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Build the BENCH extension: the mobile probe keys on the __BENCH__ marker
      # (data-yta-bench="1"), so it must be the BENCH build, not a plain production build.
      - name: Build BENCH extension XPI
        run: |
          set -euo pipefail
          BENCH=1 node_modules/.bin/wxt build -b firefox --mv2
          rm -rf dist/bench-web-ext-artifacts
          mkdir -p dist/bench-web-ext-artifacts dist
          node_modules/.bin/web-ext build \
            --source-dir=.output/firefox-mv2 \
            --artifacts-dir=dist/bench-web-ext-artifacts \
            --overwrite-dest
          cp dist/bench-web-ext-artifacts/*.zip dist/youtube-audio-bench.xpi

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Fenix emulator probe
        uses: reactivecircus/android-emulator-runner@v2
        env:
          FENIX_APK_URL: ${{ github.event.inputs.fenix_apk_url || env.FENIX_APK_URL }}
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none -no-snapshot
          script: |
            # android-emulator-runner executes this script under dash (/usr/bin/sh), which does
            # not support `set -o pipefail` (a bashism). Use `set -u` only; failures are contained
            # because the guarded steps use `|| true` and the final probe determines the exit code.
            set -u
            adb wait-for-device
            # google_apis (non-Play) images allow adb root; needed for a clean temp-addon install.
            adb root || true
            adb wait-for-device

            echo "Installing x86_64 Fenix from: $FENIX_APK_URL"
            curl -fL --retry 3 --retry-delay 5 -o /tmp/fenix.apk "$FENIX_APK_URL"
            adb install -r -g /tmp/fenix.apk

            # Launch Fenix once so first-run state initializes before we drive its UI.
            adb shell monkey -p org.mozilla.fenix -c android.intent.category.LAUNCHER 1 || true
            sleep 8

            # tests/e2e/android/ui.py hardcodes a macOS Homebrew SDK path. Shim it to the
            # Linux runner's SDK so its `adb` invocation resolves.
            sudo mkdir -p /opt/homebrew/share
            sudo ln -sfn "${ANDROID_SDK_ROOT:-$ANDROID_HOME}" /opt/homebrew/share/android-commandlinetools

            # Enable "Remote debugging via USB" so geckodriver can attach to Fenix's Marionette.
            # NOTE: the exact menu labels are Fenix-version-specific and the single most likely
            # thing to need tuning on the first live run. Everything is guarded and the UI is
            # dumped to the log so the real labels can be read back and adjusted.
            python3 tests/e2e/android/ui.py list || true
            python3 tests/e2e/android/ui.py tap "more options" || python3 tests/e2e/android/ui.py tap "menu" || true
            sleep 2
            python3 tests/e2e/android/ui.py tap "settings" || true
            sleep 2
            python3 tests/e2e/android/ui.py scroll down || true
            python3 tests/e2e/android/ui.py tap "remote debugging" || true
            sleep 2

            # Drive the core audio-only path on live m.youtube.com via geckodriver + Marionette.
            node tests/e2e/probe-mobile-fenix.mjs
