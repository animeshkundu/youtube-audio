version: 2
updates:
  # Extension dependencies (WXT, Preact, TypeScript, Vitest, web-ext, selenium, etc.).
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: Etc/UTC
    open-pull-requests-limit: 10
    labels:
      - dependencies
    commit-message:
      prefix: 'deps'
    groups:
      # Keep routine dev-tooling bumps in a single PR to cut review noise.
      dev-dependencies:
        dependency-type: development

  # GitHub Actions used across the CI / release / mobile / canary workflows.
  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: Etc/UTC
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: 'ci'
