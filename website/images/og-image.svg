<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#14b8a6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  
  <!-- Decorative circles -->
  <circle cx="1100" cy="100" r="200" fill="#14b8a6" opacity="0.1"/>
  <circle cx="100" cy="530" r="150" fill="#06b6d4" opacity="0.1"/>
  
  <!-- Icon -->
  <g transform="translate(150, 215)">
    <circle cx="100" cy="100" r="90" fill="url(#accentGrad)"/>
    <g fill="white" transform="translate(50, 50)">
      <ellipse cx="35" cy="62" rx="16" ry="12" transform="rotate(-20 35 62)"/>
      <ellipse cx="75" cy="54" rx="16" ry="12" transform="rotate(-20 75 54)"/>
      <rect x="47" y="16" width="8" height="50"/>
      <rect x="87" y="8" width="8" height="50"/>
      <polygon points="47,16 55,16 95,8 95,20 55,28 47,28"/>
    </g>
  </g>
  
  <!-- Text -->
  <text x="400" y="280" font-family="Inter, Arial, sans-serif" font-size="72" font-weight="700" fill="white">YouTube Audio</text>
  <text x="400" y="360" font-family="Inter, Arial, sans-serif" font-size="32" fill="#94a3b8">Stream only audio from YouTube</text>
  <text x="400" y="420" font-family="Inter, Arial, sans-serif" font-size="28" fill="#14b8a6">Save battery & bandwidth</text>
</svg>
