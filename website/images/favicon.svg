<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="128" height="128">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#14b8a6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="50" cy="50" r="45" fill="url(#grad1)"/>
  <!-- Music note -->
  <g fill="white">
    <!-- Note head 1 -->
    <ellipse cx="35" cy="62" rx="8" ry="6" transform="rotate(-20 35 62)"/>
    <!-- Note head 2 -->
    <ellipse cx="55" cy="58" rx="8" ry="6" transform="rotate(-20 55 58)"/>
    <!-- Stems -->
    <rect x="41" y="28" width="4" height="35"/>
    <rect x="61" y="24" width="4" height="35"/>
    <!-- Beam -->
    <polygon points="41,28 45,28 65,24 65,30 45,34 41,34"/>
  </g>
</svg>
